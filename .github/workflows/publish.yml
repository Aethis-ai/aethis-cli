name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual / chained trigger. GitHub deliberately does not fire `push: tags`
  # workflows for tags pushed by GITHUB_TOKEN (e.g. from auto-tag.yml), so we
  # expose a workflow_dispatch entry point that auto-tag.yml chains into.
  # workflow_dispatch + repository_dispatch are the only events GITHUB_TOKEN
  # is allowed to trigger.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and publish (e.g. v0.12.1)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0   # setuptools-scm needs full history for versioning
          fetch-tags: true # …and tags, explicitly (actions/checkout no longer fetches tags by default)

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches pyproject version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          PYPROJECT_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [[ "$PYPROJECT_VERSION" != "$VERSION" ]]; then
            echo "Tag $RELEASE_TAG does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution
        run: |
          pip install --quiet "twine>=6.0" "packaging>=24.2"
          twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aethis-cli
    permissions:
      id-token: write  # trusted publishing via OIDC — no token needed

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Verify PyPI received release
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          for attempt in {1..12}; do
            PUBLISHED="$(python -c 'import json, urllib.request; print(json.load(urllib.request.urlopen("https://pypi.org/pypi/aethis-cli/json", timeout=30))["info"]["version"])')"
            if [[ "$PUBLISHED" == "$VERSION" ]]; then
              echo "PyPI has aethis-cli $VERSION"
              exit 0
            fi
            echo "PyPI reports $PUBLISHED, waiting for $VERSION (attempt $attempt/12)"
            sleep 10
          done
          exit 1

      - name: Trigger workspace release sync
        env:
          WORKSPACE_SYNC_TOKEN: ${{ secrets.WORKSPACE_SYNC_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${WORKSPACE_SYNC_TOKEN:-}" ]]; then
            echo "WORKSPACE_SYNC_TOKEN not configured; skipping workspace dispatch."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $WORKSPACE_SYNC_TOKEN" \
            https://api.github.com/repos/Aethis-ai/aethis-workspace/dispatches \
            -d "{\"event_type\":\"release-package-published\",\"client_payload\":{\"package\":\"aethis-cli\",\"version\":\"${RELEASE_TAG#v}\",\"tag\":\"$RELEASE_TAG\"}}"
